# =============================================================
#  Deploy to VPS on merge to main
#
#  Triggers when a pull request targeting `main` is closed AND merged.
#  Also exposes a manual `workflow_dispatch` button for one-off deploys.
#
#  The job SSHes into the VPS and runs `./deploy.sh` from the repo
#  checkout that lives there.  GitHub-hosted runners cannot reach
#  your VPS directly, so authentication is via an SSH key stored as
#  a repository secret.
#
#  Required repository secrets (Settings -> Secrets and variables -> Actions):
#    VPS_HOST                    Cloudflare Access SSH hostname (e.g. ssh.example.com)
#    VPS_USER                    SSH user to connect as (must own VPS_DEPLOY_PATH)
#    VPS_SSH_KEY                 PEM-encoded private key (matching public key
#                                must be in ~VPS_USER/.ssh/authorized_keys)
#    VPS_DEPLOY_PATH             absolute path of repo clone on VPS (e.g. /opt/testgym)
#    CF_ACCESS_CLIENT_ID         Cloudflare Access service token ID
#    CF_ACCESS_CLIENT_SECRET     Cloudflare Access service token secret
#
#  VPS reached via Cloudflare Tunnel (port 22 not exposed publicly).
#  Cloudflare Zero Trust setup (one-time):
#    1. Tunnel routes ssh.example.com -> ssh://localhost:22 on VPS
#    2. Access -> Applications -> Self-hosted SSH app for ssh.example.com
#    3. Access -> Service Auth -> create service token, add policy allowing it
#
#  Pre-requisite on the VPS (one-time setup):
#    - Docker + docker-compose-v2 installed
#    - The repository cloned at $VPS_DEPLOY_PATH on the `main` branch
#    - $VPS_DEPLOY_PATH/gym-management/.env populated with real values
# =============================================================

name: Deploy to VPS

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Only run for merged PRs (skip PRs that were closed without merging).
    # workflow_dispatch always passes this guard.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Show trigger metadata
        run: |
          echo "Event:       ${{ github.event_name }}"
          echo "Ref:         ${{ github.ref }}"
          echo "SHA:         ${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR:          #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
            echo "Merged by:   ${{ github.event.pull_request.merged_by.login }}"
            echo "Merge SHA:   ${{ github.event.pull_request.merge_commit_sha }}"
          fi

      - name: Install cloudflared
        run: |
          curl -sSL -o cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Configure SSH with cloudflared ProxyCommand
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<EOF
          Host $VPS_HOST
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ProxyCommand cloudflared access ssh --hostname %h
          EOF
          chmod 600 ~/.ssh/config

      - name: Run deploy.sh on VPS over SSH
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" bash -s <<EOF
          set -euo pipefail
          cd "$VPS_DEPLOY_PATH"
          echo "[remote] pwd=\$(pwd)"
          echo "[remote] running ./deploy.sh ..."
          ./deploy.sh
          EOF

      - name: Fetch latest deploy log from VPS
        if: always()
        continue-on-error: true
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          mkdir -p deploy-logs
          scp "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/gym-management/logs/deploy-*.log" deploy-logs/ || true

      - name: Upload deploy log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-${{ github.run_id }}
          path: deploy-logs/
          if-no-files-found: warn
          retention-days: 30
