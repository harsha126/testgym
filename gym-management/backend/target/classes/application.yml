server:
    port: 8080

spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/gymdb
        username: gymuser
        password: gympass
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true
    flyway:
        enabled: true
        locations: classpath:db/migration
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 10MB

app:
    csv-import:
        username: csvadmin
        password: changeme123
    jwt:
        secret: gym-management-super-secret-key-that-is-at-least-256-bits-long-for-hs256
        expiration-ms: 900000 # 15 minutes
        refresh-expiration-ms: 604800000 # 7 days
    vapid:
        public-key: BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkOs-qy_kGRbKfiLbE0Dg1JiV4QUwJ7VKLhYMneJo0
        private-key: UUxI4O8-FbRouAevSmBQ6o18hgE4nSG3qwvJTfKc-ls
        subject: mailto:admin@ironaddicts.com

logging:
    level:
        root: INFO
        com.gym: DEBUG
        org.springframework.security: WARN
        org.hibernate.SQL: WARN
    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
