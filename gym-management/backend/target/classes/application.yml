server:
    port: 8080

spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/gymdb
        username: gymuser
        password: gympass
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true
    flyway:
        enabled: true
        locations: classpath:db/migration
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 10MB

app:
    jwt:
        secret: gym-management-super-secret-key-that-is-at-least-256-bits-long-for-hs256
        expiration-ms: 86400000 # 24 hours
