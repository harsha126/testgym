services:
    postgres:
        image: postgres:15-alpine
        container_name: gym-postgres
        environment:
            POSTGRES_DB: gymdb
            POSTGRES_USER: gymuser
            POSTGRES_PASSWORD: gympass
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U gymuser -d gymdb"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build: ./backend
        container_name: gym-backend
        ports:
            - "8080:8080"
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gymdb
            SPRING_DATASOURCE_USERNAME: gymuser
            SPRING_DATASOURCE_PASSWORD: gympass
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8080/actuator/health || exit 1",
                ]
            interval: 15s
            timeout: 10s
            retries: 5
            start_period: 40s

    frontend:
        build: ./frontend
        container_name: gym-frontend
        ports:
            - "80:80"
        depends_on:
            - backend

volumes:
    pgdata:
